name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth-db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: ./mvnw test
        env:
          DB_PASSWORD: test
          JWT_SECRET: test-secret-at-least-32-characters-long-for-ci
          MAIL_USERNAME: test
          MAIL_PASSWORD: test
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GITHUB_CLIENT_ID: test
          GITHUB_CLIENT_SECRET: test
          KEY_STORE_PASS: test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t auth-service .
